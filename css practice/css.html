<!DOCTYPE html>
<html>
<head>
<title>CSS Selectors Practice</title>

<style>

/* Universal Selector */
*{
  font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

/* Element Selector */
p{
  color: blue;
}

/* Class Selector */
.redText{
  color: red;
}

/* ID Selector */
#mainTitle{
  color: green;
}

/* Grouping Selector */
h2, h3{
  background-color: yellow;
}

</style>

</head>

<body>

<h1 id="mainTitle">Learning CSS Selectors</h1>

<p>This is a paragraph</p>

<p class="redText">This paragraph has a class</p>

<h2>Heading Two</h2>
<h3>Heading Three</h3>

</body>
</html>
