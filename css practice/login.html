<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <style>
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* CENTER EVERYTHING */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* CARD */
.body{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:300px;
    padding:20px;
    border-radius:10px;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    gap:15px;
}

/* INPUT */
.email input{
    width:100%;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* GOOGLE SIGNIN */
.logo{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.logo img{
    width:40px;
    transition:0.3s;
}

.logo img:hover{
    transform:scale(1.1);
}

/* TEXT */
p{
    color:#555;
}
button{
    width: 100px;
    height: 40px;
    background-color: skyblue;
    border-radius: 20px;
}
    </style>
  </head>
  <body>
    <div class="body">
      <div class="email" >
        <form >
    <input type="email" placeholder="Enter your email" required />
   
</form>
      </div>
      <p>Or</p>
      <div class="logo">
        <img src="assets/g.png" alt="google" />
        <p>signin with google</p>
       
      </div>
      <div> <a href="team5.html">
    <button>Login</button>
</a></div>
    </div>
    
  </body>
</html>
