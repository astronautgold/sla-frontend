<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <center>
      <header><h1>Recuritment for space station work</h1></header>
      <form action="">
        <table>
          <tr>
            <td><label for="name">Name</label></td>
            <td>
              <input type="text" placeholder="Enter your name" required />
            </td>
          </tr>

          <tr>
            <td><label for="gender">Gender</label></td>
            <td>
              <input type="radio" name="gender" /> Female
              <input type="radio" name="gender" /> Male
              <input type="radio" name="gender" /> Others
            </td>
          </tr>

          <tr>
            <td><label for="Weight">weight</label></td>
            <td>
              <input
                type="number"
                placeholder="enter your weight in kgs"
                min="50"
                max="60"
              />
            </td>
          </tr>
          <tr>
            <td><label for="Height">Height</label></td>
            <td>
              <input
                type="number"
                placeholder="enter your Height in cms"
                min="155"
                for
                girls
                and
                173
                for
                boys
              />
            </td>
          </tr>
          <tr>
            <td><label for="age">Age</label></td>
            <td>
              <input
                type="number"
                placeholder="enter your age"
                required
                min="30"
                max="40"
              />
            </td>
          </tr>
          <tr>
            <td><label for="skills">skills</label></td>
            <td>
              <input type="checkbox" name="skills" /> Communication
              <input type="checkbox" name="skills" /> Physiscs
              <input type="checkbox" name="skills" /> Logical thinking<br />
              <input type="checkbox" name="skills" /> Swimming
              <input type="checkbox" name="skills" /> Mathematics
              <input type="checkbox" name="skills" /> Fittness
            </td>
          </tr>
          <tr>
            <td><label for="address">Address</label></td>
            <td><textarea name="Address" required></textarea></td>
          </tr>
          <tr>
            <td><input type="submit" /></td>
          </tr>
        </table>
      </form>

      <table border="4">
        <thead>
          <th>S.No</th>
          <th>Name</th>
          <th>Age</th>
          <th>Gender</th>
          <th>city</th>

      </table>
    </center>
  </body>
</html>
