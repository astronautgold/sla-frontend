<script>
  // even or odd
  let myage = 21;
  if (myage % 2 === 0) {
    console.log("even");
  } else {
    console.log("false");
  }
  //Greater number

  let science = 45;
  let maths = 78;

  if (science > maths) {
    console.log("science is greater");
  } else {
    console.log("maths is greater");
  }
  // Positive,Negative,Zero numbers
  let num = 0;
  if (num > 0) {
    console.log("This is positive number");
  } else if (num === 0) {
    console.log("It is a Zero");
  } else {
    console.log("this is Negative number");
  }

  //Simple Calculator

  let num1 = 45;
  let num2 = 30;
  let operator = "/";
  if (operator === "+") {
    console.log("Addition :" + (num1 + num2));
  } else if (operator === "-") {
    console.log("Subraction:" + (num1 - num2));
  } else if (operator === "*") {
    console.log("Multiplication:" + num1 * num2);
  } else if (operator === "/") {
    console.log("Division:" + num1 / num2);
  } else {
    console.log("Invalid operator!");
  }

  //Age Eligiblity
  let age = 12;
  if (age >= 18) {
    console.log("Eligible");
  } else {
    console.log("Not eligible");
  }

  //Marks
  let mark = 12;
  if (mark >= 40) {
    console.log("pass");
  } else {
    console.log("Fail");
  }

  //Largest of 3 numbers

  let first = 78;
  let second = 89;
  let third = 34;

  if (first > second && first > third) {
    console.log("first is greater ");
  } else if (second > first && second > third) {
    console.log("Second is greater");
  } else if (third > first && third > second) {
    console.log("Third is greater");
  } else {
    console.log("All are equal");
  }
</script>
