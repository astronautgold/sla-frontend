<script>
    
// ARRAY METHOD TASKS


// 1️⃣ Add Element
let a1 = [10, 20, 30];
a1.push(40);
console.log("Add Element:", a1);


// 2️⃣ Remove Last Element
let a2 = [10, 20, 30, 40];
let removed = a2.pop();
console.log("Removed Last:", removed);


// 3️⃣ Add at Beginning
let a3 = [20, 30];
a3.unshift(10);
console.log("Add at Beginning:", a3);


// 4️⃣ Remove First Element
let a4 = [10, 20, 30];
a4.shift();
console.log("After Removing First:", a4);


// 5️⃣ Double Values
let a5 = [1, 2, 3, 4];
let doubled = a5.map(n => n * 2);
console.log("Doubled:", doubled);


// 6️⃣ Filter Even Numbers
let a6 = [1, 2, 3, 4, 5, 6];
let even = a6.filter(n => n % 2 === 0);
console.log("Even Numbers:", even);


// 7️⃣ Find First Greater Value
let a7 = [5, 10, 15, 20];
let first = a7.find(n => n > 10);
console.log("First > 10:", first);


// 8️⃣ Check Value Exists
let a8 = [10, 20, 30];
console.log("20 Exists:", a8.includes(20));



// ARRAY LOOPING TASKS


// 9️⃣ Print All Elements
let b1 = [10, 20, 30, 40];
for (let i = 0; i < b1.length; i++) {
    console.log("Element:", b1[i]);
}


// 🔟 Sum of Array
let b2 = [10, 20, 30];
let sum = 0;
for (let i = 0; i < b2.length; i++) {
    sum += b2[i];
}
console.log("Sum:", sum);


// 1️⃣1️⃣ Count Even Numbers
let b3 = [1, 2, 3, 4, 5, 6];
let countEven = 0;
for (let i = 0; i < b3.length; i++) {
    if (b3[i] % 2 === 0) countEven++;
}
console.log("Even Count:", countEven);


// 1️⃣2️⃣ Find Largest Number
let b4 = [10, 50, 20, 80];
let max = b4[0];
for (let i = 1; i < b4.length; i++) {
    if (b4[i] > max) max = b4[i];
}
console.log("Largest:", max);


// 1️⃣3️⃣ Reverse Array Using Loop
let b5 = [10, 20, 30];
for (let i = 0; i < Math.floor(b5.length / 2); i++) {
    let temp = b5[i];
    b5[i] = b5[b5.length - 1 - i];
    b5[b5.length - 1 - i] = temp;
}
console.log("Reversed:", b5);


// 1️⃣4️⃣ Print Odd Numbers
let b6 = [1, 2, 3, 4, 5];
for (let i = 0; i < b6.length; i++) {
    if (b6[i] % 2 !== 0) {
        console.log("Odd:", b6[i]);
    }
}


// 1️⃣5️⃣ Count Elements Greater Than 10
let b7 = [5, 15, 25, 3];
let count = 0;
for (let i = 0; i < b7.length; i++) {
    if (b7[i] > 10) count++;
}
console.log("Count > 10:", count);
</script>
